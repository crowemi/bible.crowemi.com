{{define "home"}}
  <style>
    .emphasis {
      color: white;
      font-style: italic;
    }
  </style>
  <div class="bg-white px-6 py-12 sm:py-24 lg:px-8 dark:bg-gray-900">
    <div class="mx-auto max-w-2xl text-center">
      <h2 class="text-5xl font-semibold tracking-tight text-gray-900 sm:text-7xl dark:text-white">Sola Scriptura</h2>
      <p class="mt-8 text-lg font-medium text-pretty text-gray-500 sm:text-xl/8 dark:text-gray-400">The <span class="emphasis">blessed</span> man delights in the law of the Lord, and on his law he <span class="emphasis">meditates</span> day and night. (Psalm 1:2)</p>
    </div>
  </div>

  <div class="py-6 mx-auto bg-white dark:bg-gray-900">
  <ul role="list" class="divide-y divide-gray-100 dark:divide-white/5">
    {{ range .Scripture }}
    <li class="mx-auto py-6 px-4 max-w-2xl">
      <a href="{{.Link}}"><h2 class="text-5xl font-semibold tracking-tight text-gray-900 sm:text-7xl dark:text-white">{{ .Passage }}</h2></a>
      <span class="inline-flex items-center rounded-md bg-gray-100 px-2 py-1 my-4 text-xs font-medium text-gray-600 dark:bg-gray-400/10 dark:text-gray-400">{{ .Plan }}</span>
      <p class="mt-4 text-base text-gray-700 dark:text-gray-300">{{ .Summary }}</p>
      <button type="button" class="my-4 inline-flex items-center gap-x-1.5 rounded-md bg-indigo-600 px-2.5 py-1.5 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 dark:bg-indigo-500 dark:shadow-none dark:hover:bg-indigo-400 dark:focus-visible:outline-indigo-500">
      <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="-ml-0.5 size-5">
        <path d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd" fill-rule="evenodd" />
      </svg>
      Mark Read
      </button>
    </li>
    {{ end}}
  </ul>
  </div>
{{template "base" .}}
{{end}}
